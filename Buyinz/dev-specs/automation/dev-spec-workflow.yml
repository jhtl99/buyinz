# Auto-generate / update a development specification when a user-story PR is approved.
#
# NOTE: This file is a staging copy of the workflow that must live at the repo root at
#       .github/workflows/dev-spec.yml for GitHub Actions to pick it up. It is kept in
#       dev-specs/automation/ so that the automation and its prompts review together.
#
# Trigger: a PR that has a label starting with `story:` becomes "approved".
# Output: a follow-up PR that commits the generated/updated spec under Buyinz/dev-specs/
#         and a tracking GitHub Issue linked to the original story Issue.

name: Dev Spec (LLM)

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  generate-spec:
    name: Generate or update development specification
    if: >-
      github.event.review.state == 'approved' &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'story:')
    runs-on: ubuntu-latest

    env:
      STORY_SLUG: ""
      SPEC_PATH: ""
      PROMPT_PATH: ""
      MODE: ""

    steps:
      - name: Check out the approved PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Pick the story label and resolve spec paths
        id: story
        run: |
          set -euo pipefail
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          STORY=$(echo "$LABELS" | jq -r '.[] | select(startswith("story:"))' | head -n1 | sed 's/^story://')
          if [ -z "$STORY" ]; then
            echo "::error::No story:<slug> label on PR; skipping."
            exit 1
          fi
          echo "STORY_SLUG=$STORY" >> "$GITHUB_ENV"
          echo "SPEC_PATH=Buyinz/dev-specs/${STORY}.md" >> "$GITHUB_ENV"
          if [ -f "Buyinz/dev-specs/${STORY}.md" ]; then
            echo "MODE=update" >> "$GITHUB_ENV"
            echo "PROMPT_PATH=Buyinz/dev-specs/prompts/dev-spec-update.md" >> "$GITHUB_ENV"
          else
            echo "MODE=generate" >> "$GITHUB_ENV"
            echo "PROMPT_PATH=Buyinz/dev-specs/prompts/dev-spec-generate.md" >> "$GITHUB_ENV"
          fi

      - name: Collect PR diff and issue context
        run: |
          set -euo pipefail
          git diff ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} > pr.diff
          {
            echo "TITLE: ${{ github.event.pull_request.title }}"
            echo "NUMBER: ${{ github.event.pull_request.number }}"
            echo "BODY:"
            cat <<'__EOF__'
          ${{ github.event.pull_request.body }}
          __EOF__
          } > pr-context.txt

      - name: Call the LLM to produce or update the specification
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Use an Anthropic-compatible CLI (example: anthropic-cli or a tiny Node/Python script)
          # checked in under scripts/devspec/run-llm.js to keep the workflow deterministic.
          node scripts/devspec/run-llm.js \
            --prompt "$PROMPT_PATH" \
            --spec   "$SPEC_PATH" \
            --diff   pr.diff \
            --context pr-context.txt \
            --mode   "$MODE" \
            --out    "$SPEC_PATH"

      - name: Create tracking Issue for the spec update
        id: track
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `Dev spec ${process.env.MODE} for story:${process.env.STORY_SLUG} (PR #${{ github.event.pull_request.number }})`,
              body:  [
                `Automated: dev spec ${process.env.MODE} for \`${process.env.STORY_SLUG}\`.`,
                `Triggering PR: #${{ github.event.pull_request.number }}.`,
                `Spec path: \`${process.env.SPEC_PATH}\`.`,
                '',
                'Kanban: move to **Review** when the spec PR opens.',
              ].join('\n'),
              labels: ['devspec', `story:${process.env.STORY_SLUG}`],
            });
            core.setOutput('number', issue.number);

      - name: Open a PR with the generated spec
        uses: peter-evans/create-pull-request@v6
        with:
          branch: docs/devspec-${{ env.STORY_SLUG }}-pr-${{ github.event.pull_request.number }}
          base:   main
          commit-message: |
            docs(devspec): ${{ env.MODE }} spec for ${{ env.STORY_SLUG }} (closes #${{ steps.track.outputs.number }})
          title: "docs(devspec): ${{ env.MODE }} spec for ${{ env.STORY_SLUG }}"
          body: |
            Generated by **Dev Spec (LLM)** workflow in response to approved PR #${{ github.event.pull_request.number }}.

            - Mode: `${{ env.MODE }}`
            - Spec path: `${{ env.SPEC_PATH }}`
            - Tracking issue: #${{ steps.track.outputs.number }}

            Please review for accuracy before merging to `main`.
          labels: devspec,story:${{ env.STORY_SLUG }}
