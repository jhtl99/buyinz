name: Auto Dev Spec (Copilot CLI)

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to process
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read
  issues: read

jobs:
  generate-dev-spec:
    name: Generate/update dev specification
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved')

    steps:
      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Gather PR + issue context
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REVIEW_USER: ${{ github.event.review.user.login }}
        run: |
          mkdir -p .tmp Buyinz/dev-specs

          # Resolve branch/sha and stop on forks to avoid push failures
          PR_JSON=$(gh pr view "$PR_NUMBER" --json headRefName,headRepositoryOwner,headRepository,isCrossRepository,closingIssuesReferences,body,title,author,mergedBy,mergedAt,state)

          IS_FORK=$(echo "$PR_JSON" | jq -r '.isCrossRepository')
          if [ "$IS_FORK" = "true" ]; then
            echo "Skipping: PR comes from a fork and cannot be pushed to with workflow token."
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH=$(echo "$PR_JSON" | jq -r '.headRefName')
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          ISSUE_NUMBER=$(echo "$PR_JSON" | jq -r '.closingIssuesReferences[0].number // empty')
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No linked closing issue found on PR #$PR_NUMBER; skipping."
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Resolve the devspec tracking sub-issue. Three strategies, in order:
          #   1. Deterministic label `devspec-for-<parent>` applied by
          #      create-devspec-subissue.yml to every new sub-issue.
          #   2. The "Created DevSpec tracking issue: #N" comment the sub-issue
          #      creator leaves on the parent user-story issue (works for legacy
          #      sub-issues that pre-date the label).
          #   3. A last-resort REST search on the title.
          # The value is sanitised at the end so anything non-numeric collapses
          # back to empty (which previously produced commit messages like
          # `(refs #{)` when a pretty-printed JSON response leaked through).
          TRACKING_ISSUE_NUMBER=""

          CANDIDATE=$(gh issue list \
            --state all \
            --label "devspec-for-${ISSUE_NUMBER}" \
            --limit 5 \
            --json number \
            --jq '.[0].number // empty' || true)
          if [ -n "$CANDIDATE" ]; then
            TRACKING_ISSUE_NUMBER="$CANDIDATE"
          fi

          if [ -z "$TRACKING_ISSUE_NUMBER" ]; then
            CANDIDATE=$(gh api \
              "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
              --jq '[.[] | select(.body | test("Created DevSpec tracking issue: #"))][-1].body' \
              2>/dev/null | grep -oE '#[0-9]+' | head -n 1 | tr -d '#' || true)
            if [ -n "$CANDIDATE" ]; then
              TRACKING_ISSUE_NUMBER="$CANDIDATE"
            fi
          fi

          if [ -z "$TRACKING_ISSUE_NUMBER" ]; then
            CANDIDATE=$(gh api \
              --method GET \
              search/issues \
              --raw-field q="repo:${GITHUB_REPOSITORY} is:issue [DevSpec] Story ${ISSUE_NUMBER} in:title" \
              --jq '[.items[] | select((.pull_request // null) == null) | .number][0] // empty' \
              2>/dev/null || true)
            if [ -n "$CANDIDATE" ]; then
              TRACKING_ISSUE_NUMBER="$CANDIDATE"
            fi
          fi

          # Final sanitation: keep only digits. Anything else (whitespace, `{`,
          # error text, jq errors) becomes empty so the commit message never
          # ships with a broken `(refs #...)` suffix.
          TRACKING_ISSUE_NUMBER=$(printf '%s' "$TRACKING_ISSUE_NUMBER" | tr -cd '0-9')

          if [ -n "$TRACKING_ISSUE_NUMBER" ]; then
            echo "Found devspec tracking issue #$TRACKING_ISSUE_NUMBER for user story #$ISSUE_NUMBER."
          else
            echo "No devspec tracking issue found for user story #$ISSUE_NUMBER. Commit message will reference only the user story issue."
          fi

          # Owner resolution.
          #   Primary   = PR author (the person who initiated the story's implementation).
          #   Secondary = merger if the PR is already merged (backfill / workflow_dispatch),
          #               otherwise the reviewer whose approval triggered this run.
          PRIMARY_OWNER=$(echo "$PR_JSON" | jq -r '.author.login // empty')
          SECONDARY_OWNER=$(echo "$PR_JSON" | jq -r '.mergedBy.login // empty')
          MERGE_DATE=$(echo "$PR_JSON" | jq -r '.mergedAt // empty' | cut -dT -f1)
          if [ -z "$SECONDARY_OWNER" ] && [ -n "$REVIEW_USER" ]; then
            SECONDARY_OWNER="$REVIEW_USER"
          fi
          if [ -z "$MERGE_DATE" ]; then
            MERGE_DATE=$(date -u +%Y-%m-%d)
          fi

          # Fall back to top committers on the PR's changed files if gh metadata is empty.
          if [ -z "$PRIMARY_OWNER" ] || [ -z "$SECONDARY_OWNER" ]; then
            BASE_REF=$(gh pr view "$PR_NUMBER" --json baseRefOid -q '.baseRefOid' 2>/dev/null || echo "")
            HEAD_REF=$(gh pr view "$PR_NUMBER" --json headRefOid -q '.headRefOid' 2>/dev/null || echo "")
            if [ -n "$BASE_REF" ] && [ -n "$HEAD_REF" ]; then
              mapfile -t RANKED < <(
                git log --pretty='%an' "${BASE_REF}..${HEAD_REF}" 2>/dev/null \
                  | sed '/^$/d' \
                  | awk '!seen[$0]++ { order[NR]=$0 } { count[$0]++ } END { for (i=1;i<=NR;i++) if (order[i]) print count[order[i]]"\t"order[i] }' \
                  | sort -t$'\t' -k1,1nr -k2,2 \
                  | cut -f2
              )
              if [ -z "$PRIMARY_OWNER" ];   then PRIMARY_OWNER="${RANKED[0]:-Unknown}";   fi
              if [ -z "$SECONDARY_OWNER" ]; then SECONDARY_OWNER="${RANKED[1]:-Unknown}"; fi
            fi
          fi
          PRIMARY_OWNER="${PRIMARY_OWNER:-Unknown}"
          SECONDARY_OWNER="${SECONDARY_OWNER:-Unknown}"

          echo "Resolved owners: primary=$PRIMARY_OWNER secondary=$SECONDARY_OWNER merge_date=$MERGE_DATE"
          echo "primary_owner=$PRIMARY_OWNER"     >> "$GITHUB_OUTPUT"
          echo "secondary_owner=$SECONDARY_OWNER" >> "$GITHUB_OUTPUT"
          echo "merge_date=$MERGE_DATE"           >> "$GITHUB_OUTPUT"

          echo "$ISSUE_NUMBER" > .tmp/issue_number.txt
          echo "$TRACKING_ISSUE_NUMBER" > .tmp/tracking_issue_number.txt
          gh issue view "$ISSUE_NUMBER" --json body -q '.body' > .tmp/user_story.md
          gh pr diff "$PR_NUMBER" > .tmp/pr_diff.patch

          SPEC_PATH="Buyinz/dev-specs/story-${ISSUE_NUMBER}.md"
          echo "$SPEC_PATH" > .tmp/spec_path.txt

          if [ -f "$SPEC_PATH" ]; then
            echo "mode=update" >> "$GITHUB_OUTPUT"
            cp "$SPEC_PATH" .tmp/existing_spec.md
          else
            echo "mode=new" >> "$GITHUB_OUTPUT"
            : > .tmp/existing_spec.md
          fi

      - name: Build final prompt
        if: steps.context.outputs.should_skip != 'true'
        run: |
          if [ "${{ steps.context.outputs.mode }}" = "new" ]; then
            node .github/scripts/generate-dev-spec.mjs \
              --mode new \
              --new-template .github/prompts/new-devspec.md \
              --user-story .tmp/user_story.md \
              --primary-owner "${{ steps.context.outputs.primary_owner }}" \
              --secondary-owner "${{ steps.context.outputs.secondary_owner }}" \
              --merge-date "${{ steps.context.outputs.merge_date }}" \
              --output .tmp/final_prompt.txt
          else
            node .github/scripts/generate-dev-spec.mjs \
              --mode update \
              --update-template .github/prompts/update-devspec.md \
              --existing-spec .tmp/existing_spec.md \
              --pr-diff .tmp/pr_diff.patch \
              --user-story .tmp/user_story.md \
              --pr-number "${{ steps.pr.outputs.number }}" \
              --primary-owner "${{ steps.context.outputs.primary_owner }}" \
              --secondary-owner "${{ steps.context.outputs.secondary_owner }}" \
              --merge-date "${{ steps.context.outputs.merge_date }}" \
              --output .tmp/final_prompt.txt
          fi

          {
            echo ""
            echo "Output constraints:"
            echo "- Output only the final markdown document."
            echo "- Do not wrap output in code fences."
            echo "- Ensure diagrams are valid Mermaid syntax."
          } >> .tmp/final_prompt.txt

      - name: Check out PR branch
        if: steps.context.outputs.should_skip != 'true'
        run: |
          git checkout "${{ steps.context.outputs.branch }}"

      - name: Run Copilot CLI
        if: steps.context.outputs.should_skip != 'true'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          SPEC_PATH=$(cat .tmp/spec_path.txt)
          PROMPT=$(cat .tmp/final_prompt.txt)
          copilot -p "$PROMPT" --no-ask-user > "$SPEC_PATH"

      - name: Commit and push changes
        if: steps.context.outputs.should_skip != 'true'
        env:
          BRANCH: ${{ steps.context.outputs.branch }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          SPEC_PATH=$(cat .tmp/spec_path.txt)
          ISSUE_NUMBER=$(cat .tmp/issue_number.txt)
          TRACKING_ISSUE_NUMBER=$(cat .tmp/tracking_issue_number.txt)

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$SPEC_PATH"
          if git diff --cached --quiet; then
            echo "No dev spec changes detected."
            exit 0
          fi

          COMMIT_MSG="docs(devspec): update story #$ISSUE_NUMBER for PR #$PR_NUMBER"
          # Defensive: only append the (refs #N) suffix if TRACKING_ISSUE_NUMBER
          # is strictly numeric. Previously non-numeric leakage produced commit
          # messages like `(refs #{)`.
          if [ -n "$TRACKING_ISSUE_NUMBER" ] && printf '%s' "$TRACKING_ISSUE_NUMBER" | grep -qE '^[0-9]+$'; then
            COMMIT_MSG="$COMMIT_MSG (refs #$TRACKING_ISSUE_NUMBER)"
          fi

          git commit -m "$COMMIT_MSG"
          git push origin "HEAD:$BRANCH"
