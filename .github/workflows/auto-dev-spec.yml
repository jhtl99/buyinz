name: Auto Dev Spec (Copilot CLI)

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to process
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read
  issues: read

jobs:
  generate-dev-spec:
    name: Generate/update dev specification
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved')

    steps:
      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Gather PR + issue context
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          mkdir -p .tmp Buyinz/dev-specs

          # Resolve branch/sha and stop on forks to avoid push failures
          PR_JSON=$(gh pr view "$PR_NUMBER" --json headRefName,headRepositoryOwner,headRepository,isCrossRepository,closingIssuesReferences,body,title)

          IS_FORK=$(echo "$PR_JSON" | jq -r '.isCrossRepository')
          if [ "$IS_FORK" = "true" ]; then
            echo "Skipping: PR comes from a fork and cannot be pushed to with workflow token."
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH=$(echo "$PR_JSON" | jq -r '.headRefName')
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          ISSUE_NUMBER=$(echo "$PR_JSON" | jq -r '.closingIssuesReferences[0].number // empty')
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No linked closing issue found on PR #$PR_NUMBER; skipping."
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$ISSUE_NUMBER" > .tmp/issue_number.txt
          gh issue view "$ISSUE_NUMBER" --json body -q '.body' > .tmp/user_story.md
          gh pr diff "$PR_NUMBER" > .tmp/pr_diff.patch

          SPEC_PATH="Buyinz/dev-specs/story-${ISSUE_NUMBER}.md"
          echo "$SPEC_PATH" > .tmp/spec_path.txt

          if [ -f "$SPEC_PATH" ]; then
            echo "mode=update" >> "$GITHUB_OUTPUT"
            cp "$SPEC_PATH" .tmp/existing_spec.md
          else
            echo "mode=new" >> "$GITHUB_OUTPUT"
            : > .tmp/existing_spec.md
          fi

      - name: Build final prompt
        if: steps.context.outputs.should_skip != 'true'
        run: |
          if [ "${{ steps.context.outputs.mode }}" = "new" ]; then
            node .github/scripts/generate-dev-spec.mjs \
              --mode new \
              --new-template .github/prompts/new-devspec.md \
              --user-story .tmp/user_story.md \
              --output .tmp/final_prompt.txt
          else
            node .github/scripts/generate-dev-spec.mjs \
              --mode update \
              --update-template .github/prompts/update-devspec.md \
              --existing-spec .tmp/existing_spec.md \
              --pr-diff .tmp/pr_diff.patch \
              --user-story .tmp/user_story.md \
              --pr-number "${{ steps.pr.outputs.number }}" \
              --output .tmp/final_prompt.txt
          fi

          {
            echo ""
            echo "Output constraints:"
            echo "- Output only the final markdown document."
            echo "- Do not wrap output in code fences."
            echo "- Ensure diagrams are valid Mermaid syntax."
          } >> .tmp/final_prompt.txt

      - name: Check out PR branch
        if: steps.context.outputs.should_skip != 'true'
        run: |
          git checkout "${{ steps.context.outputs.branch }}"

      - name: Run Copilot CLI
        if: steps.context.outputs.should_skip != 'true'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          SPEC_PATH=$(cat .tmp/spec_path.txt)
          PROMPT=$(cat .tmp/final_prompt.txt)
          copilot -p "$PROMPT" --no-ask-user > "$SPEC_PATH"

      - name: Commit and push changes
        if: steps.context.outputs.should_skip != 'true'
        env:
          BRANCH: ${{ steps.context.outputs.branch }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          SPEC_PATH=$(cat .tmp/spec_path.txt)
          ISSUE_NUMBER=$(cat .tmp/issue_number.txt)

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$SPEC_PATH"
          if git diff --cached --quiet; then
            echo "No dev spec changes detected."
            exit 0
          fi

          git commit -m "docs(devspec): update story #$ISSUE_NUMBER for PR #$PR_NUMBER"
          git push origin "HEAD:$BRANCH"
