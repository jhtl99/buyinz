name: Create DevSpec Subissue

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: read

jobs:
  create-devspec-subissue:
    name: Create linked devspec issue
    runs-on: ubuntu-latest
    if: contains(join(github.event.issue.labels.*.name, ','), 'user-story')

    steps:
      - name: Create subissue if missing
        uses: actions/github-script@v7
        env:
          COPILOT_ASSIGNEE: ${{ vars.COPILOT_ASSIGNEE }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const parent = context.payload.issue;
            const assignee = process.env.COPILOT_ASSIGNEE;

            // Deterministic per-story label so the auto-dev-spec workflow can find
            // this sub-issue exactly (GitHub's fuzzy title search drops the `#N`,
            // which made the previous search approach unreliable).
            const linkLabel = `devspec-for-${parent.number}`;

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
              } catch (e) {
                if (e.status !== 422) throw e;
              }
            }
            await ensureLabel("devspec", "5319E7", "LLM dev spec work");
            await ensureLabel("documentation", "0075CA", "Improvements or additions to documentation");
            await ensureLabel(linkLabel, "C5DEF5", `Tracks the devspec sub-issue for user story #${parent.number}`);

            // Prefer the deterministic label lookup. Fall back to a title scan for
            // sub-issues created before the label was introduced.
            let existing = null;

            const labeled = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "all",
              labels: `devspec,${linkLabel}`,
              per_page: 10,
            });
            existing = labeled.data.find((item) => !item.pull_request) || null;

            if (!existing) {
              const query = `repo:${owner}/${repo} is:issue in:title "[DevSpec] Story #${parent.number}"`;
              const search = await github.rest.search.issuesAndPullRequests({
                q: query,
                per_page: 10,
              });
              existing = search.data.items.find((item) => !item.pull_request) || null;
            }

            if (existing) {
              // Backfill the tracking label onto legacy sub-issues so the other
              // workflow can reliably find them next time.
              const names = (existing.labels || []).map((l) => (typeof l === "string" ? l : l.name));
              if (!names.includes(linkLabel)) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: existing.number,
                  labels: [linkLabel],
                });
                core.info(`Backfilled ${linkLabel} onto existing DevSpec issue #${existing.number}`);
              } else {
                core.info(`DevSpec issue already exists: #${existing.number}`);
              }
              return;
            }

            const issueBody = [
              `Auto-created from user story #${parent.number}.`,
              "",
              `Parent User Story: #${parent.number}`,
              "",
              "## Checklist",
              "- [ ] Generate initial development spec markdown",
              "- [ ] Open PR with spec changes",
              "- [ ] Request review and merge",
              "",
              "Use the automated Copilot workflow to generate/update this specification.",
              "",
              `<!-- devspec:parent=${parent.number} -->`,
            ].join("\n");

            const created = await github.rest.issues.create({
              owner,
              repo,
              title: `[DevSpec] Story #${parent.number}: ${parent.title}`,
              body: issueBody,
              labels: ["devspec", "documentation", linkLabel],
              ...(assignee ? { assignees: [assignee] } : {}),
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: parent.number,
              body: `Created DevSpec tracking issue: #${created.data.number}`,
            });
